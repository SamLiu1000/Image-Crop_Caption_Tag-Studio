    content.id = `catContent_${cat.id}`;
    
    if (cat.tags.length === 0) {
      content.innerHTML = `<div style="font-size:9px;color:var(--muted);font-style:italic;padding:6px">${t('cat.tags.modal.empty')}</div>`;
    } else {
      cat.tags.forEach(tag => {
        const tagEl = document.createElement('div');
        tagEl.className = 'ts-tag-item';
        tagEl.dataset.tag = tag;
        tagEl.textContent = tag;
        tagEl.addEventListener('click', () => addTagFromSidebar(tag, tagEl));
        content.appendChild(tagEl);
      });
    }
    
    catSection.appendChild(header);
    catSection.appendChild(content);
    list.appendChild(catSection);
  });
}

function toggleTagGroupsSidebar() {
  const bar = $('tagGroupsBarSidebar');
  bar.classList.toggle('collapsed');
}

function toggleSection(contentId) {
  const content = $(contentId);
  const header = content.previousElementSibling;
  content.classList.toggle('collapsed');
  header.classList.toggle('collapsed');
}

function toggleCategorySection(catId) {
  const content = $(`catContent_${catId}`);
  const header = content.previousElementSibling;
  content.classList.toggle('collapsed');
  header.classList.toggle('collapsed');
}

async function addTagFromSidebar(tagName, tagEl) {
  const fullTag = tagName + getSuffix();
  if (selectedIdx >= 0 && folderHandle) {
    const item = imageFiles[selectedIdx];
    if (item.tags.includes(fullTag)) {
      showToast(t('toast.tag.exists') + ' ' + fullTag, 'warn', 1500);
      return;
    }
    item.tags.push(fullTag);
    try {
      await saveTags(item);
      renderCurrentTags();
      renderGallery();
      tagEl.classList.add('added');
      setTimeout(() => tagEl.classList.remove('added'), 500);
      showToast(t('toast.tag.write') + ' ' + fullTag, 'info', 1500);
    } catch { item.tags.pop(); }
  } else {
    try { await navigator.clipboard.writeText(fullTag); } catch {
      const ta = document.createElement('textarea');
      ta.value = fullTag; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    showToast(t('toast.tag.copy') + ' ' + fullTag, 'info', 1500);
  }
}

async function applyTagGroup(id, chipEl) {
  const grp = tagGroups.find(g => g.id === id);
  if (!grp) return;
  const suffix   = getSuffix();
  const tagsToAdd = grp.tags.map(t => t + suffix);

  if (selectedIdx >= 0 && folderHandle) {
    const item = imageFiles[selectedIdx];
    let added = 0, skipped = 0;
    for (const t of tagsToAdd) {
      if (item.tags.includes(t)) { skipped++; }
      else { item.tags.push(t); added++; }
    }
    if (added > 0) {
      try {
        await saveTags(item);
        renderCurrentTags();
        renderGallery();
        chipEl && chipEl.classList.add('applying');
        setTimeout(() => chipEl && chipEl.classList.remove('applying'), 700);
        const skipText = skipped > 0 ? t('toast.tg.apply.skip', {skipped}) : '';
        showToast(t('toast.tg.apply.success', {name: grp.name, added, skipped: skipText}), 'info', 2500);
      } catch {}
    } else {
      showToast(t('toast.tg.apply.all.skip', {name: grp.name, skipped}), 'warn', 2000);
    }
  } else {
    const text = tagsToAdd.join(', ');
    try { await navigator.clipboard.writeText(text); } catch {
      const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
    chipEl && chipEl.classList.add('applying');
    setTimeout(() => chipEl && chipEl.classList.remove('applying'), 700);
    showToast(t('toast.tg.copy.success', {name: grp.name, count: tagsToAdd.length}), 'info', 2200);
  }
}

function deleteTgGroup(id) {
  const grp = tagGroups.find(g => g.id === id);
  if (!grp) return;
  if (!confirm(t('toast.tg.delete.confirm', {name: grp.name}))) return;
  tagGroups = tagGroups.filter(g => g.id !== id);
  tgSave(); renderTagGroups();
  showToast(t('toast.tg.delete.success', {name: grp.name}), 'info', 1800);
}

function openTgModal(editId) {
  tgEditId   = editId;
  tgSelected = new Set();
  const overlay   = $('tgModalOverlay');
  const titleEl   = $('tgModalTitle');
  const nameInput = $('tgModalNameInput');
  const search    = $('tgModalSearch');

  if (editId) {
    const grp = tagGroups.find(g => g.id === editId);
    if (grp) {
      titleEl.textContent = t('tg.modal.title.edit');
      nameInput.value = grp.name;
      grp.tags.forEach(t => tgSelected.add(t));
    }
  } else {
    titleEl.textContent = t('tg.modal.title.new');
    nameInput.value = '';
  }
  search.value = '';
  overlay.classList.remove('hidden');
  renderTgModalTags();
  updateTgSelCount();
  setTimeout(() => nameInput.focus(), 60);
}

function closeTgModal() { $('tgModalOverlay').classList.add('hidden'); }
function onTgOverlayClick(e) { if (e.target === $('tgModalOverlay')) closeTgModal(); }

function renderTgModalTags() {
  const body   = $('tgModalBody');
  const kw     = $('tgModalSearch').value.trim().toLowerCase();
  body.innerHTML = '';

  // 收集所有已选但不在categories中的自定义标签
  const allCatTags = new Set();
  categories.forEach(cat => cat.tags.forEach(t => allCatTags.add(t)));
  const customTags = [...tgSelected].filter(t => !allCatTags.has(t));

  // 显示栏目标签
  if (categories.length === 0 && customTags.length === 0) {
    body.innerHTML = `<div style="font-size:10px;color:var(--muted);font-style:italic;text-align:center;padding:20px">${t('toast.cat.no.categories')}</div>`;
    return;
  }

  categories.forEach(cat => {
    const tags = cat.tags.filter(t => !kw || t.toLowerCase().includes(kw));
    if (tags.length === 0) return;

    const section = document.createElement('div');
    section.className = 'tg-modal-section';
    section.innerHTML = `<div class="tg-modal-sec-title" style="color:var(--c3)">${escHtml(cat.name)}</div>`;
    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'tg-modal-tags';

    tags.forEach(tag => {
      const el = document.createElement('div');
      el.className = 'tg-sel-tag' + (tgSelected.has(tag) ? ' selected' : '');
      el.dataset.en = tag;
      el.innerHTML = `<span class="tg-sel-tag-cn">${escHtml(tag)}</span>`;
      el.addEventListener('click', () => {
        if (tgSelected.has(tag)) { tgSelected.delete(tag); el.classList.remove('selected'); }
        else { tgSelected.add(tag); el.classList.add('selected'); }
        updateTgSelCount();
      });
      tagsDiv.appendChild(el);
    });
    section.appendChild(tagsDiv);
    body.appendChild(section);
  });

  // 显示已选的自定义标签
  const filteredCustomTags = customTags.filter(t => !kw || t.toLowerCase().includes(kw));
  if (filteredCustomTags.length > 0) {
    const section = document.createElement('div');
    section.className = 'tg-modal-section';
    section.innerHTML = `<div class="tg-modal-sec-title" style="color:var(--c4)">已选自定义标签</div>`;
    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'tg-modal-tags';

    filteredCustomTags.forEach(tag => {
      const el = document.createElement('div');
      el.className = 'tg-sel-tag selected';
      el.dataset.en = tag;
      el.innerHTML = `<span class="tg-sel-tag-cn">${escHtml(tag)}</span>
                      <span class="ctag-del" style="margin-left:6px" onclick="removeCustomTagFromGroup('${escHtml(tag)}', event)">×</span>`;
      el.querySelector('.tg-sel-tag-cn').addEventListener('click', () => {
        tgSelected.delete(tag);
        renderTgModalTags();
        updateTgSelCount();
      });
      tagsDiv.appendChild(el);
    });
    section.appendChild(tagsDiv);
    body.appendChild(section);
  }
}

function removeCustomTagFromGroup(tag, event) {
  if (event) event.stopPropagation();
  tgSelected.delete(tag);
  renderTgModalTags();
  updateTgSelCount();
}

function tgToggleSelectAll() {
  const visible = document.querySelectorAll('#tgModalBody .tg-sel-tag');
  const allSel  = [...visible].every(el => el.classList.contains('selected'));
  visible.forEach(el => {
    const tag = el.dataset.en;
    if (allSel) { tgSelected.delete(tag); el.classList.remove('selected'); }
    else { tgSelected.add(tag); el.classList.add('selected'); }
  });
  $('tgSelAllBtn').textContent = allSel ? t('tg.modal.select.none') : t('tg.modal.select.all');
  updateTgSelCount();
}

function updateTgSelCount() {
  const n = tgSelected.size;
  $('tgSelCount').textContent = n;
  $('tgModalSave').disabled = (n === 0);
  updateTgSelectedSummary();
}

function updateTgSelectedSummary() {
  const container = $('tgSelectedSummaryTags');
  container.innerHTML = '';
  
  if (tgSelected.size === 0) {
    container.innerHTML = `<span style="font-size:9px;color:var(--muted);font-style:italic">${t('tg.modal.selected.empty')}</span>`;
    return;
  }
  
  const sortedTags = [...tgSelected].sort();
  sortedTags.forEach(tag => {
    const el = document.createElement('div');
    el.className = 'tg-summary-tag';
    el.innerHTML = `${escHtml(tag)}<span class="ctag-del" onclick="removeTagFromSummary('${escHtml(tag)}', event)">×</span>`;
    container.appendChild(el);
  });
}

function removeTagFromSummary(tag, event) {
  if (event) event.stopPropagation();
  tgSelected.delete(tag);
  updateTgSelCount();
  renderTgModalTags();
}

function addCustomTagToGroup() {
  const tag = prompt(t('toast.tg.custom.prompt'));
  if (!tag || !tag.trim()) return;
  
  const trimmedTag = tag.trim();
  
  // 检查是否已存在于已选标签中
  if (tgSelected.has(trimmedTag)) {
    showToast(t('toast.tg.custom.exists'), 'warn', 1800);
    return;
  }
  
  // 添加到已选标签集合
  tgSelected.add(trimmedTag);
  
  // 更新UI
  updateTgSelCount();
  renderTgModalTags();
  
  showToast(t('toast.tg.custom.success', {tag: trimmedTag}), 'info', 1800);
}

function saveTgGroup() {
  const name = $('tgModalNameInput').value.trim();
  if (!name) { $('tgModalNameInput').focus(); showToast(t('toast.tg.save.warn'),'warn',1800); return; }
  if (tgSelected.size === 0) { showToast(t('toast.tg.select.warn'),'warn',1800); return; }

  if (tgEditId) {
    const grp = tagGroups.find(g => g.id === tgEditId);
    if (grp) { grp.name = name; grp.tags = [...tgSelected]; }
  } else {
    tagGroups.push({ id: 'tg_' + Date.now(), name, tags: [...tgSelected] });
  }

  tgSave(); renderTagGroups(); renderTagSidebar(); closeTgModal();
  showToast(t('toast.tg.save.success', {name, count: tgSelected.size}), 'info', 2500);
}

// ═══════════════════ CATEGORIES MANAGEMENT FUNCTIONS ═══════════════════
function openCatModal() {
  const overlay = $('catModalOverlay');
  overlay.classList.remove('hidden');
  renderCatList();
}

function closeCatModal() {
  $('catModalOverlay').classList.add('hidden');
}

function onCatOverlayClick(e) {
  if (e.target === $('catModalOverlay')) closeCatModal();
}

function renderCatList() {
  const list = $('catList');
  list.innerHTML = '';
  
  if (categories.length === 0) {
    list.innerHTML = `<div style="font-size:10px;color:var(--muted);font-style:italic">${t('cat.modal.empty')}</div>`;
    return;
  }
  
  categories.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.className = 'tg-modal-section';
    catEl.style.marginBottom = '12px';
    catEl.style.padding = '10px';
    catEl.style.background = 'var(--tag-bg)';
    catEl.style.borderRadius = '6px';
    catEl.style.border = '1px solid var(--border)';
    
    const header = document.createElement('div');
    header.style.display = 'flex';
    header.style.alignItems = 'center';
    header.style.justifyContent = 'space-between';
    header.style.marginBottom = '8px';
    
    const nameDiv = document.createElement('div');
    nameDiv.style.fontSize = '11px';
    nameDiv.style.fontWeight = '600';
    nameDiv.style.color = 'var(--c3)';
    nameDiv.textContent = cat.name;
    
    const actions = document.createElement('div');
    actions.style.display = 'flex';
    actions.style.gap = '6px';
    
    const manageBtn = document.createElement('button');
    manageBtn.className = 'tg-sel-all-btn';
    manageBtn.style.borderColor = 'var(--c3)';
    manageBtn.style.color = 'var(--c3)';
    manageBtn.textContent = t('cat.tags.modal.manage');
    manageBtn.onclick = () => openCatTagsModal(cat.id);
    
    const delBtn = document.createElement('button');
    delBtn.className = 'tg-sel-all-btn';
    delBtn.style.borderColor = '#ff6b6b';
    delBtn.style.color = '#ff6b6b';
    delBtn.textContent = t('cat.tags.modal.delete');
    delBtn.onclick = () => deleteCategory(cat.id);
    
    actions.appendChild(manageBtn);
    actions.appendChild(delBtn);
    
    header.appendChild(nameDiv);
    header.appendChild(actions);
    
    const tagsPreview = document.createElement('div');
    tagsPreview.style.fontSize = '9px';
    tagsPreview.style.color = 'var(--muted)';
    tagsPreview.style.lineHeight = '1.5';
    tagsPreview.textContent = `${t('cat.tags.modal.count', {count: cat.tags.length}).replace('{count}', cat.tags.length)}：${cat.tags.slice(0, 5).join(', ')}${cat.tags.length > 5 ? '...' : ''}`;
    
    catEl.appendChild(header);
    catEl.appendChild(tagsPreview);
    list.appendChild(catEl);
  });
}

function addNewCategory() {
  const name = prompt(t('toast.cat.add.prompt'));
  if (!name || !name.trim()) return;
  
  categories.push({
    id: 'cat_' + Date.now(),
    name: name.trim(),
    tags: []
  });
  
  catSave();
  renderCatList();
  renderTagSidebar();
  showToast(t('toast.cat.add.success', {name: name.trim()}), 'info', 2000);
}

function deleteCategory(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  
  if (!confirm(t('toast.cat.delete.confirm', {name: cat.name}))) return;
  
  categories = categories.filter(c => c.id !== id);
  catSave();
  renderCatList();
  renderTagSidebar();
  showToast(t('toast.cat.delete.success', {name: cat.name}), 'info', 1800);
}

function openCatTagsModal(catId) {
  catTagEditId = catId;
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  
  $('catTagsModalTitle').textContent = t('cat.tags.modal.title.prefix') + cat.name + t('cat.tags.modal.title.suffix');
  $('catNameInput').value = cat.name;
  $('catTagSearch').value = '';
  $('catTagsModalOverlay').classList.remove('hidden');
  renderCatTags();
}

function closeCatTagsModal() {
  $('catTagsModalOverlay').classList.add('hidden');
  catTagEditId = null;
}

function onCatTagsOverlayClick(e) {
  if (e.target === $('catTagsModalOverlay')) closeCatTagsModal();
}

function saveCategoryName() {
  const cat = categories.find(c => c.id === catTagEditId);
  if (!cat) return;
  
  const name = $('catNameInput').value.trim();
  if (!name) {
    showToast(t('toast.cat.name.warn'), 'warn', 1800);
    return;
  }
  
  cat.name = name;
  catSave();
  $('catTagsModalTitle').textContent = t('cat.tags.modal.title.prefix') + name + t('cat.tags.modal.title.suffix');
  renderCatList();
  renderTagSidebar();
  showToast(t('toast.cat.name.success'), 'info', 1800);
}

function renderCatTags() {
  const body = $('catTagsModalBody');
  const kw = $('catTagSearch').value.trim().toLowerCase();
  const cat = categories.find(c => c.id === catTagEditId);
  if (!cat) return;
  
  body.innerHTML = '';
  
  const filteredTags = cat.tags.filter(tag =>
    !kw || tag.toLowerCase().includes(kw)
  );
  
  if (filteredTags.length === 0) {
    body.innerHTML = `<div style="font-size:10px;color:var(--muted);font-style:italic;text-align:center;padding:20px">${t('cat.tags.modal.empty')}</div>`;
    $('catTagsCount').innerHTML = t('cat.tags.modal.count', {count: '0'});
    return;
  }
  
  const tagsDiv = document.createElement('div');
  tagsDiv.className = 'tg-modal-tags';
  
  filteredTags.forEach(tag => {
    const el = document.createElement('div');
    el.className = 'tg-sel-tag';
    el.style.position = 'relative';
    el.innerHTML = `<span class="tg-sel-tag-cn">${escHtml(tag)}</span>
                    <span class="ctag-del" style="position:absolute;top:2px;right:2px;font-size:10px;padding:0 4px" onclick="deleteCatTag('${escHtml(tag)}', event)">×</span>`;
    tagsDiv.appendChild(el);
  });
  
  body.appendChild(tagsDiv);
  $('catTagsCount').innerHTML = t('cat.tags.modal.count', {count: cat.tags.length});
}

function addNewTagToCategory() {
  const tag = prompt(t('toast.cat.tag.add.prompt'));
  if (!tag || !tag.trim()) return;
  
  const cat = categories.find(c => c.id === catTagEditId);
  if (!cat) return;
  
  const trimmedTag = tag.trim();
  if (cat.tags.includes(trimmedTag)) {
    showToast(t('toast.cat.tag.exists'), 'warn', 1800);
    return;
  }
  
  cat.tags.push(trimmedTag);
  catSave();
  renderCatTags();
  renderCatList();
  renderTagSidebar();
  showToast(t('toast.cat.tag.add.success', {tag: trimmedTag}), 'info', 1800);
}

function deleteCatTag(tag, event) {
  if (event) event.stopPropagation();
  
  const cat = categories.find(c => c.id === catTagEditId);
  if (!cat) return;
  
  if (!confirm(t('toast.cat.tag.delete.confirm', {tag}))) return;
  
  cat.tags = cat.tags.filter(tagItem => tagItem !== tag);
  catSave();
  renderCatTags();
  renderCatList();
  renderTagSidebar();
  showToast(t('toast.cat.tag.delete.success', {tag}), 'info', 1500);
}
</script>
